name: Release to NPM

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        type: choice
        options: [patch, minor, major]
        default: patch
      dry_run:
        description: 'Dry run (build only, no push or publish)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    # Skip the bot's own release commit (avoid loops) and any commit that opts out via [skip release].
    # head_commit.message is only used in `if:` (evaluated by Actions, not shell-interpolated).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        !startsWith(github.event.head_commit.message, 'release:') &&
        !contains(github.event.head_commit.message, '[skip release]')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Install
        run: npm ci

      - name: Typecheck + build + test
        run: |
          npm run typecheck
          npm run build
          npm test

      # Always-run preview so dry-runs (and real runs' logs) surface what
      # version *would* be cut, even though the bump-and-push step does its
      # own compute internally for race recovery.
      - name: Show planned version
        env:
          BUMP: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          set -euo pipefail
          git fetch origin --tags --prune --force >/dev/null
          pkg=$(node -p "require('./package.json').version")
          tag=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sort -V | tail -1)
          : "${tag:=0.0.0}"
          base=$(printf '%s\n%s\n' "$pkg" "$tag" | sort -V | tail -1)
          NEXT=$(awk -v v="$base" -v k="$BUMP" 'BEGIN {
            split(v, p, ".")
            if (k == "major") { p[1]++; p[2]=0; p[3]=0 }
            else if (k == "minor") { p[2]++; p[3]=0 }
            else { p[3]++ }
            print p[1] "." p[2] "." p[3]
          }')
          echo "package.json: $pkg, highest tag: $tag"
          echo "Baseline: $base, bump: $BUMP, planned: v$NEXT"

      # Bump-and-push live in one step so a race (another commit landed on main
      # between checkout and push) can be resolved by resetting to origin/main
      # and recomputing the version, instead of trying to rebase a package.json
      # bump that would conflict with the new HEAD.
      - name: Bump, tag, and push (atomic, recompute on race)
        id: release
        if: github.event.inputs.dry_run != 'true'
        env:
          BUMP: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          set -euo pipefail

          # Take the higher of (local package.json) and (highest published v* tag)
          # so we never collide with a version another (possibly racing) run cut.
          compute_next() {
            git fetch origin --tags --prune --force >/dev/null
            local pkg tag base
            pkg=$(node -p "require('./package.json').version")
            tag=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sort -V | tail -1)
            : "${tag:=0.0.0}"
            base=$(printf '%s\n%s\n' "$pkg" "$tag" | sort -V | tail -1)
            awk -v v="$base" -v k="$BUMP" 'BEGIN {
              split(v, p, ".")
              if (k == "major") { p[1]++; p[2]=0; p[3]=0 }
              else if (k == "minor") { p[2]++; p[3]=0 }
              else { p[3]++ }
              print p[1] "." p[2] "." p[3]
            }'
          }

          apply_bump() {
            local v=$1
            npm version "$v" --no-git-tag-version >/dev/null
            git add package.json package-lock.json
            git commit -m "release: $v"
            git tag -a "v$v" -m "release: $v"
          }

          NEXT=$(compute_next)
          echo "Computed next version: $NEXT"
          apply_bump "$NEXT"

          attempts=3
          for attempt in $(seq 1 $attempts); do
            if git push origin "HEAD:refs/heads/main" "refs/tags/v$NEXT" --atomic; then
              echo "Pushed v$NEXT on attempt $attempt"
              echo "version=$NEXT" >> "$GITHUB_OUTPUT"
              echo "tag=v$NEXT" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push failed (attempt $attempt of $attempts)"
            if [ "$attempt" -eq "$attempts" ]; then
              exit 1
            fi
            echo "Resetting to origin/main and recomputing..."
            git fetch origin main
            git tag -d "v$NEXT" 2>/dev/null || true
            git reset --hard origin/main
            NEXT=$(compute_next)
            echo "Recomputed next version: $NEXT"
            apply_bump "$NEXT"
          done
          exit 1

      # Idempotent: skip if the version is already on npm (e.g. a previous
      # run published successfully but failed at the gh-release step).
      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if npm view "@opperai/cli@$VERSION" version >/dev/null 2>&1; then
            echo "@opperai/cli@$VERSION already published; skipping."
          else
            npm publish --access public
          fi

      - name: Create GitHub release
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
