name: Release to NPM

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        type: choice
        options: [patch, minor, major]
        default: patch
      dry_run:
        description: 'Dry run (build but do not publish)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    # Skip the bot's own release commit (avoid loops) and any commit that opts out via [skip release].
    # head_commit.message is only used in `if:` (evaluated by Actions, not shell-interpolated).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        !startsWith(github.event.head_commit.message, 'release:') &&
        !contains(github.event.head_commit.message, '[skip release]')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Install
        run: npm ci

      - name: Typecheck + build + test
        run: |
          npm run typecheck
          npm run build
          npm test

      - name: Bump version
        id: version
        env:
          BUMP: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          TAG=$(npm version "$BUMP" -m "release: %s")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        if: github.event.inputs.dry_run != 'true'
        run: npm publish --access public

      - name: Push commit, tag, and create release
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git push origin HEAD --follow-tags
          gh release create "$TAG" --title "$TAG" --generate-notes
